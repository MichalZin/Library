<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <form>
        <label for="title">Title</label>
        <input type="text" id="title" class="field"></input>
        <label for="author">Author</label>
        <input type="text" id="author" class="field"></input>
        <label for="pages">Number of Pages</label>
        <input type="number" value="pages" id="pages" class="field">
        <label for="readStatus">Was it read?</label>
        <select id="readStatus" class="field">
            <option>Yes</option>
            <option>No</option>
        </select>
        <label for="submit">Submit</label>
        <input type="submit" id="submit">
    </form>
    <div id="bookList">
        
    </div>
</body>
</html>
